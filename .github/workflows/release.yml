name: Release

# 태그 vX.Y.Z 가 push되면 자동으로 빌드 + 테스트 + GitHub Release 생성
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # GitHub Release 생성에 필요

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 이전 태그까지 가져와야 자동 changelog 생성됨

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package dist as zip
        run: |
          cd dist
          zip -r "../cipher-studio-web-${GITHUB_REF_NAME}.zip" .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: cipher-studio-web-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
